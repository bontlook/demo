spring.application.name=forest
server.port=8081

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/forest?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 文件上传目录（末尾需带路径分隔符）
app.upload-dir=D:/JavaWeb/end/forest/src/main/resources/static/data/

# JWT配置
app.jwt.secret=ForestApp2024SecureKeyMustBe32BytesLong!
app.jwt.expiration=86400000