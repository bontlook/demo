<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻雷达 - 多源新闻聚合器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">新闻雷达</a>
            <form class="d-flex ms-auto" action="{{ url_for('search') }}" method="get">
                <input class="form-control me-2" type="search" name="q" placeholder="搜索新闻..."
                       value="{{ search_keyword|default('') }}">
                <button class="btn btn-outline-light" type="submit">搜索</button>
            </form>
            <form class="ms-2" action="{{ url_for('refresh') }}" method="post">
                <button class="btn btn-warning" type="submit">刷新</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4 mt-5">
        <small>新闻雷达 &copy; 2026 | 每30分钟自动刷新</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
