<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsRadar - Multi-Source News Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">NewsRadar</a>
            <form class="d-flex ms-auto" action="{{ url_for('search') }}" method="get">
                <input class="form-control me-2" type="search" name="q" placeholder="Search news..."
                       value="{{ search_keyword|default('') }}">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
            <form class="ms-2" action="{{ url_for('refresh') }}" method="post">
                <button class="btn btn-warning" type="submit">Refresh</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5 border-top">
        <small>NewsRadar &copy; 2026 | Auto-refreshes every 30 minutes</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
