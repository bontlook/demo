
<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuMall - 登录</title>
    <link rel="stylesheet" th:href="@{/css/dl506.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .left-panel {
            flex: 1;
            background-image: url(/images/1.png);
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
            background-color: #ffffff;
            max-width: 600px;
        }

        .logo-container {
            margin-bottom: 50px;
            text-align: center;
        }

        .logo-main {
            font-size: 64px;
            font-weight: bold;
            color: #1e3a5f;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .logo-main span {
            color: #f59e0b;
        }

        .logo-subtitle {
            font-size: 20px;
            color: #666;
            letter-spacing: 1px;
        }

        .login-form {
            width: 100%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #ffffff;
        }

        .form-input::placeholder {
            color: #999;
        }

        .form-input:focus {
            border-color: #1677ff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .btn-login:hover {
            background: #0958d9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
        }

        .btn-outline {
            width: 100%;
            padding: 12px;
            background: white;
            color: #666;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            border-color: #1677ff;
            color: #1677ff;
            background-color: #f6f9ff;
        }

        .copyright {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 13px;
            width: 100%;
        }

        .danger {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 6px;
            margin: 16px 0;
            font-size: 14px;
        }

        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px 16px;
            border-radius: 6px;
            margin: 16px 0;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .left-panel {
                min-height: 200px;
                flex: none;
            }

            .right-section {
                padding: 40px 30px;
                max-width: 100%;
            }

            .logo-main {
                font-size: 48px;
            }

            .left-logo {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="left-panel">
    </div>
    <div class="right-section">
        <div class="logo-container">
            <div class="logo-main"><span>N</span>euMall</div>
            <div class="logo-subtitle">大连东软信息学院</div>
        </div>
        <div class="login-form">
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">账号</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="请输入您的账号" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="请输入您的密码" required>
                </div>
                <button type="submit" class="btn-login">登录</button>
            </form>
            <div class="form-group">
                <button class="btn-outline">已有账号？去登录</button>
            </div>
            <div class="copyright">
                <p>Copyright © 2026 大连东软信息学院</p>
            </div>
            <div th:if="${param.error}" class="danger">
                用户名或密码错误
            </div>
            <div th:if="${param.logout}" class="success">
                已成功退出登录
            </div>
        </div>
    </div>
</div>
</body>
</html>
