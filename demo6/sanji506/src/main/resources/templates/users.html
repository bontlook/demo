<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - NeuMall</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    .admin-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #ffffff;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid #e8e8e8;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-main {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .logo-main .n {
      color: #f59e0b;
    }

    .logo-main .text {
      color: #1e3a5f;
    }

    .logo-subtitle {
      font-size: 14px;
      color: #666;
      letter-spacing: 1px;
    }

    .user-info {
      padding: 20px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .user-info:hover {
      background-color: #f6f9ff;
    }

    .user-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    .user-name {
      font-size: 15px;
      font-weight: 500;
      color: #333;
    }

    .user-arrow {
      color: #999;
      font-size: 20px;
    }

    .logout-btn {
      margin: 0 20px 20px;
      padding: 8px 16px;
      background: white;
      border: 1px solid #ff4d4f;
      color: #ff4d4f;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
      text-align: center;
    }

    .logout-btn:hover {
      background: #ff4d4f;
      color: white;
    }

    .menu {
      flex: 1;
      padding: 8px 0;
    }

    .menu-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 15px;
      color: #333;
    }

    .menu-item:hover {
      background-color: #f6f9ff;
      color: #1677ff;
    }

    .menu-item.active {
      background-color: #e6f4ff;
      color: #1677ff;
      border-left: 3px solid #1677ff;
    }

    .menu-item.expanded {
      background-color: #f6f9ff;
    }

    .menu-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-arrow {
      transition: transform 0.3s;
      font-size: 12px;
    }

    .menu-arrow.up {
      transform: rotate(180deg);
    }

    .submenu {
      padding-left: 20px;
      background-color: #fafafa;
    }

    .submenu-item {
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      color: #666;
    }

    .submenu-item:hover {
      color: #1677ff;
      background-color: #f6f9ff;
    }

    .main-content {
      flex: 1;
      margin-left: 280px;
      padding: 40px;
    }

    .content-header {
      margin-bottom: 30px;
    }

    .content-title {
      font-size: 28px;
      font-weight: 600;
      color: #333;
    }

    .stats-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 20px;
    }

    .stat-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #1677ff;
    }

    .table-container {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }

    .table-header {
      padding: 20px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table thead {
      background-color: #fafafa;
    }

    .table th {
      padding: 16px 20px;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      border-bottom: 1px solid #e8e8e8;
    }

    .table td {
      padding: 16px 20px;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
    }

    .table tbody tr:hover {
      background-color: #fafafa;
    }

    .table tbody tr:last-child td {
      border-bottom: none;
    }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar-small {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-active {
      background-color: #f6ffed;
      color: #52c41a;
      border: 1px solid #b7eb8f;
    }

    .action-btn {
      padding: 6px 16px;
      border: 1px solid #d9d9d9;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: all 0.3s;
      margin-right: 8px;
    }

    .action-btn:hover {
      border-color: #1677ff;
      color: #1677ff;
    }

    .action-btn.danger {
      border-color: #ff4d4f;
      color: #ff4d4f;
    }

    .action-btn.danger:hover {
      background: #ff4d4f;
      color: white;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 280px;
      right: 0;
      padding: 16px 40px;
      text-align: center;
      color: #999;
      font-size: 13px;
      background-color: #f5f5f5;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 240px;
      }

      .main-content {
        margin-left: 240px;
        padding: 20px;
      }

      .footer {
        left: 240px;
      }
    }
  </style>
</head>
<body>
<div class="admin-container">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-main">
          <span class="n">N</span><span class="text">euMall</span>
        </div>
        <div class="logo-subtitle">大连东软信息学院</div>
      </div>
    </div>

    <div class="user-info">
      <div class="user-left">
        <div class="avatar">林</div>
        <div class="user-name">林星辉</div>
      </div>
      <div class="user-arrow">→</div>
    </div>

    <div class="logout-btn" onclick="window.location.href='/logout'">退出登录</div>

    <div class="menu">
      <div class="menu-item expanded" onclick="toggleMenu(this, 'platform-submenu')">
        <div class="menu-item-header">
          <span>平台管理</span>
          <span class="menu-arrow up"></span>
        </div>
      </div>
      <div class="submenu" id="platform-submenu">
        <div class="submenu-item active" onclick="window.location.href='/users'">用户管理</div>
        <div class="submenu-item" onclick="window.location.href='/shops'">店铺管理</div>
      </div>

      <div class="menu-item" onclick="toggleMenu(this, 'shop-submenu')">
        <div class="menu-item-header">
          <span>我的店铺管理</span>
          <span class="menu-arrow">∨</span>
        </div>
      </div>
      <div class="submenu" id="shop-submenu" style="display: none;">
        <div class="submenu-item">店铺信息</div>
        <div class="submenu-item">商品管理</div>
        <div class="submenu-item">订单管理</div>
      </div>

      <div class="menu-item" onclick="window.location.href='/inventory/list'">库存管理</div>
      <div class="menu-item" onclick="window.location.href='/inventory/warning'">库存预警</div>
      <div class="menu-item" onclick="window.location.href='/inventory/chart'">库存可视化</div>
    </div>

    <div style="padding: 20px; color: #999; font-size: 13px; text-align: center;">
      Copyright © 2026 大连东软信息学院
    </div>
  </div>

  <div class="main-content">
    <div class="content-header">
      <h1 class="content-title">用户管理</h1>
    </div>

    <div class="stats-cards">
      <div class="stat-card">
        <div class="stat-label">总用户数</div>
        <div class="stat-value" th:text="${#lists.size(users)}">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">活跃用户</div>
        <div class="stat-value" id="activeUserCount" style="color: #52c41a;">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日新增</div>
        <div class="stat-value" id="todayUserCount" style="color: #722ed1;">-</div>
      </div>
    </div>

    <div class="table-container">
      <div class="table-header">
        <div class="table-title">用户列表</div>
        <button class="action-btn" onclick="showAddUserModal()" style="background: #1677ff; color: white; border-color: #1677ff;">+ 添加用户</button>
      </div>
      <table class="table">
        <thead>
        <tr>
          <th>序号</th>
          <th>用户</th>
          <th>用户名</th>
          <th>手机号</th>
          <th>注册时间</th>
          <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user, iterStat : ${users}">
          <td th:text="${iterStat.count}">1</td>
          <td>
            <div class="user-cell">
              <div class="user-avatar-small" th:text="${user.nickname != null ? #strings.substring(user.nickname, 0, 1) : #strings.substring(user.username, 0, 1)}">用</div>
              <span th:text="${user.nickname != null ? user.nickname : user.username}">用户</span>
            </div>
          </td>
          <td th:text="${user.username}">-</td>
          <td th:text="${user.phone != null ? user.phone : '-'}">-</td>
          <td th:text="${user.createTime != null ? #temporals.format(user.createTime, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
          <td>
            <button class="action-btn" th:onclick="'editUser(' + ${user.id} + ')'">编辑</button>
            <button class="action-btn danger" th:onclick="'deleteUser(' + ${user.id} + ')'">删除</button>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(users)}">
          <td colspan="6" style="text-align: center; color: #999; padding: 40px;">暂无用户数据</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    Copyright © 2026 大连东软信息学院
  </div>
</div>

<div id="userModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
  <div style="background: white; border-radius: 8px; padding: 30px; width: 500px; max-width: 90%;">
    <h2 style="margin-bottom: 20px; color: #333;" id="modalTitle">添加用户</h2>
    <form id="userForm">
      <input type="hidden" id="userId" name="id">
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; color: #666;">用户名</label>
        <input type="text" id="username" name="username" required style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; color: #666;">密码</label>
        <input type="password" id="password" name="password" required style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; color: #666;">昵称</label>
        <input type="text" id="nickname" name="nickname" style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
      </div>
      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; color: #666;">手机号</label>
        <input type="text" id="phone" name="phone" style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 10px;">
        <button type="button" onclick="closeUserModal()" style="padding: 8px 20px; border: 1px solid #d9d9d9; background: white; border-radius: 4px; cursor: pointer;">取消</button>
        <button type="submit" style="padding: 8px 20px; border: none; background: #1677ff; color: white; border-radius: 4px; cursor: pointer;">保存</button>
      </div>
    </form>
  </div>
</div>

<script>
  function toggleMenu(element, submenuId) {
    const submenu = document.getElementById(submenuId);
    const arrow = element.querySelector('.menu-arrow');

    if (submenu.style.display === 'none') {
      submenu.style.display = 'block';
      arrow.classList.add('up');
      element.classList.add('expanded');
    } else {
      submenu.style.display = 'none';
      arrow.classList.remove('up');
      element.classList.remove('expanded');
    }
  }

  function showAddUserModal() {
    document.getElementById('modalTitle').textContent = '添加用户';
    document.getElementById('userForm').reset();
    document.getElementById('userId').value = '';
    document.getElementById('userModal').style.display = 'flex';
  }

  function editUser(id) {
    fetch('/user/info/' + id)
      .then(response => response.json())
      .then(user => {
        if (user) {
          document.getElementById('modalTitle').textContent = '编辑用户';
          document.getElementById('userId').value = user.id;
          document.getElementById('username').value = user.username;
          document.getElementById('password').value = user.password;
          document.getElementById('nickname').value = user.nickname || '';
          document.getElementById('phone').value = user.phone || '';
          document.getElementById('userModal').style.display = 'flex';
        }
      })
      .catch(error => {
        console.error('获取用户信息失败:', error);
        alert('获取用户信息失败');
      });
  }

  function closeUserModal() {
    document.getElementById('userModal').style.display = 'none';
  }

  document.getElementById('userForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const userId = document.getElementById('userId').value;
    const userData = {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
      nickname: document.getElementById('nickname').value,
      phone: document.getElementById('phone').value
    };

    if (userId) {
      userData.id = userId;
    }

    const url = userId ? '/user/update' : '/user/add';

    fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(userData)
    })
    .then(response => response.text())
    .then(result => {
      if (result === 'success') {
        alert(userId ? '更新成功' : '添加成功');
        location.reload();
      } else {
        alert('操作失败: ' + result);
      }
    })
    .catch(error => {
      alert('请求失败');
    });
  });

  function deleteUser(id) {
    if (confirm('确定要删除这个用户吗？')) {
      fetch('/user/delete/' + id, {
        method: 'POST'
      })
      .then(response => response.text())
      .then(result => {
        if (result === 'success') {
          alert('删除成功');
          location.reload();
        } else {
          alert('删除失败: ' + result);
        }
      })
      .catch(error => {
        alert('请求失败');
      });
    }
  }

  window.addEventListener('DOMContentLoaded', function() {
    calculateUserStats();
  });

  function calculateUserStats() {
    const rows = document.querySelectorAll('tbody tr');
    let activeCount = 0;
    let todayCount = 0;
    const today = new Date().toISOString().split('T')[0];

    rows.forEach(row => {
      const cells = row.querySelectorAll('td');
      if (cells.length > 0) {
        // 检查注册时间列（第5列，索引4）
        const timeCell = cells[4];
        if (timeCell) {
          const registerTime = timeCell.textContent.trim();

          // 活跃用户：有注册时间的用户都算活跃
          if (registerTime !== '-') {
            activeCount++;
          }

          // 今日新增：检查创建时间是否是今天
          if (registerTime.startsWith(today)) {
            todayCount++;
          }
        }
      }
    });

    document.getElementById('activeUserCount').textContent = activeCount;
    document.getElementById('todayUserCount').textContent = todayCount;
  }
</script>
