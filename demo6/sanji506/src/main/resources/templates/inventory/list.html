<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存管理 - NeuMall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #e8e8e8;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-main {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .logo-main .n {
            color: #f59e0b;
        }

        .logo-main .text {
            color: #1e3a5f;
        }

        .logo-subtitle {
            font-size: 14px;
            color: #666;
            letter-spacing: 1px;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .user-info:hover {
            background-color: #f6f9ff;
        }

        .user-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .user-name {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }

        .user-arrow {
            color: #999;
            font-size: 20px;
        }

        .logout-btn {
            margin: 0 20px 20px;
            padding: 8px 16px;
            background: white;
            border: 1px solid #ff4d4f;
            color: #ff4d4f;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            text-align: center;
        }

        .logout-btn:hover {
            background: #ff4d4f;
            color: white;
        }

        .menu {
            flex: 1;
            padding: 8px 0;
        }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            color: #333;
        }

        .menu-item:hover {
            background-color: #f6f9ff;
            color: #1677ff;
        }

        .menu-item.active {
            background-color: #e6f4ff;
            color: #1677ff;
            border-left: 3px solid #1677ff;
        }

        .menu-item.expanded {
            background-color: #f6f9ff;
        }

        .menu-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-arrow {
            transition: transform 0.3s;
            font-size: 12px;
        }

        .menu-arrow.up {
            transform: rotate(180deg);
        }

        .submenu {
            padding-left: 20px;
            background-color: #fafafa;
        }

        .submenu-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #666;
        }

        .submenu-item:hover {
            color: #1677ff;
            background-color: #f6f9ff;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
        }

        .content-header {
            margin-bottom: 30px;
        }

        .content-title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #1677ff;
        }

        .table-container {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background-color: #fafafa;
        }

        .table th {
            padding: 16px 20px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            border-bottom: 1px solid #e8e8e8;
        }

        .table td {
            padding: 16px 20px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

        .table tbody tr:hover {
            background-color: #fafafa;
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .editable-product-name:focus,
        .editable-quantity:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.2);
        }

        .editable-product-name:hover,
        .editable-quantity:hover {
            border-color: #40a9ff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-normal {
            background-color: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        .status-low {
            background-color: #fff2e8;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }

        .status-critical {
            background-color: #fff1f0;
            color: #f5222d;
            border: 1px solid #ffa39e;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 280px;
            right: 0;
            padding: 16px 40px;
            text-align: center;
            color: #999;
            font-size: 13px;
            background-color: #f5f5f5;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }

            .main-content {
                margin-left: 240px;
                padding: 20px;
            }

            .footer {
                left: 240px;
            }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-main">
                    <span class="n">N</span><span class="text">euMall</span>
                </div>
                <div class="logo-subtitle">大连东软信息学院</div>
            </div>
        </div>

        <div class="user-info">
            <div class="user-left">
                <div class="avatar">林</div>
                <div class="user-name">林星辉</div>
            </div>
            <div class="user-arrow">→</div>
        </div>

        <div class="logout-btn" onclick="window.location.href='/logout'">退出登录</div>

        <div class="menu">
            <div class="menu-item expanded" onclick="toggleMenu(this, 'platform-submenu')">
                <div class="menu-item-header">
                    <span>平台管理</span>
                    <span class="menu-arrow up"></span>
                </div>
            </div>
            <div class="submenu" id="platform-submenu">
                <div class="submenu-item" onclick="window.location.href='/users'">用户管理</div>
                <div class="submenu-item" onclick="window.location.href='/shops'">店铺管理</div>
            </div>

            <div class="menu-item" onclick="toggleMenu(this, 'shop-submenu')">
                <div class="menu-item-header">
                    <span>我的店铺管理</span>
                    <span class="menu-arrow">∨</span>
                </div>
            </div>
            <div class="submenu" id="shop-submenu" style="display: none;">
                <div class="submenu-item">店铺信息</div>
                <div class="submenu-item">商品管理</div>
                <div class="submenu-item">订单管理</div>
            </div>

            <div class="menu-item active" onclick="window.location.href='/inventory/list'">库存管理</div>
            <div class="menu-item" onclick="window.location.href='/inventory/warning'">库存预警</div>
            <div class="menu-item" onclick="window.location.href='/inventory/chart'">库存可视化</div>
        </div>

        <div style="padding: 20px; color: #999; font-size: 13px; text-align: center;">
            Copyright © 2026 大连东软信息学院
        </div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <h1 class="content-title">库存管理</h1>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-label">总商品数</div>
                <div class="stat-value" th:text="${#lists.size(list)}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">库存充足</div>
                <div class="stat-value" id="sufficientCount" style="color: #52c41a;">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">库存不足</div>
                <div class="stat-value" id="insufficientCount" style="color: #fa8c16;">-</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">库存列表</div>
                <button class="action-btn" onclick="showAddInventoryModal()" style="background: #1677ff; color: white; border-color: #1677ff;">+ 添加库存</button>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>序号</th>
                    <th>商品名称</th>
                    <th>库存数量</th>
                    <th>预警阈值</th>
                    <th>库存状态</th>
                    <th>更新时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item, iterStat : ${list}">
                    <td th:text="${iterStat.count}">1</td>
                    <td>
                        <input type="text"
                               th:value="${item.productName}"
                               th:data-inventory-id="${item.id}"
                               th:data-product-id="${item.productId}"
                               class="editable-product-name"
                               style="width: 100%; padding: 6px 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px;"
                               onfocus="this.style.borderColor='#1677ff'"
                               onblur="this.style.borderColor='#d9d9d9'">
                    </td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <button type="button"
                                    th:onclick="'adjustQuantity(' + ${item.id} + ', -1)'"
                                    style="padding: 4px 8px; border: 1px solid #d9d9d9; background: #f5f5f5; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold;">-</button>
                            <input type="number"
                                   th:value="${item.quantity}"
                                   th:data-inventory-id="${item.id}"
                                   th:data-product-id="${item.productId}"
                                   class="editable-quantity"
                                   min="0"
                                   style="width: 80px; padding: 6px 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; text-align: center;"
                                   onfocus="this.style.borderColor='#1677ff'"
                                   onblur="this.style.borderColor='#d9d9d9'">
                            <button type="button"
                                    th:onclick="'adjustQuantity(' + ${item.id} + ', 1)'"
                                    style="padding: 4px 8px; border: 1px solid #d9d9d9; background: #f5f5f5; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold;">+</button>
                        </div>
                    </td>
                    <td th:text="${item.warningQuantity != null ? item.warningQuantity : '-'}">-</td>
                    <td>
                        <span class="status-badge status-normal" th:if="${item.quantity > 50}">充足</span>
                        <span class="status-badge status-low" th:if="${item.quantity <= 50 && item.quantity > 10}">偏低</span>
                        <span class="status-badge status-critical" th:if="${item.quantity <= 10}">不足</span>
                    </td>
                    <td th:text="${item.updateTime != null ? #temporals.format(item.updateTime, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                    <td>
                        <button class="action-btn" th:onclick="'saveChanges(' + ${item.id} + ')'" style="background: #52c41a; color: white; border-color: #52c41a;">保存</button>
                        <button class="action-btn" th:onclick="'editInventory(' + ${item.id} + ')'">详细编辑</button>
                        <button class="action-btn danger" th:onclick="'deleteInventory(' + ${item.id} + ')'">删除</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(list)}">
                    <td colspan="7" style="text-align: center; color: #999; padding: 40px;">暂无库存数据</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        Copyright © 2026 大连东软信息学院
    </div>
</div>

<div id="inventoryModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 8px; padding: 30px; width: 500px; max-width: 90%; max-height: 90vh; overflow-y: auto;">
        <h2 style="margin-bottom: 20px; color: #333;" id="modalTitle">添加库存</h2>
        <form id="inventoryForm">
            <input type="hidden" id="inventoryId" name="id">

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #666;">选择商品</label>
                <select id="productId" name="productId" required style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
                    <option value="">请选择商品</option>
                </select>
            </div>

            <div style="margin-bottom: 15px; padding: 15px; background: #f6f9ff; border-radius: 4px; border: 1px dashed #1677ff;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label style="color: #1677ff; font-weight: 500;">或添加新商品</label>
                    <button type="button" onclick="toggleNewProductForm()" style="padding: 4px 12px; border: 1px solid #1677ff; background: white; color: #1677ff; border-radius: 4px; cursor: pointer; font-size: 12px;">
                        <span id="toggleBtnText">显示新商品表单</span>
                    </button>
                </div>

                <div id="newProductForm" style="display: none;">
                    <div style="margin-bottom: 10px;">
                        <label style="display: block; margin-bottom: 5px; color: #666; font-size: 13px;">商品名称 *</label>
                        <input type="text" id="newProductName" placeholder="请输入商品名称" style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="display: block; margin-bottom: 5px; color: #666; font-size: 13px;">商品编码</label>
                        <input type="text" id="newProductCode" placeholder="请输入商品编码（可选）" style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="display: block; margin-bottom: 5px; color: #666; font-size: 13px;">预警阈值 *</label>
                        <input type="number" id="newWarningQuantity" placeholder="例如：10" value="10" min="0" style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: #666;">库存数量 *</label>
                <input type="number" id="quantity" name="quantity" required min="0" value="0" style="width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px;">
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" onclick="closeInventoryModal()" style="padding: 8px 20px; border: 1px solid #d9d9d9; background: white; border-radius: 4px; cursor: pointer;">取消</button>
                <button type="submit" onclick="submitInventoryForm()" style="padding: 8px 20px; border: none; background: #1677ff; color: white; border-radius: 4px; cursor: pointer;">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleMenu(element, submenuId) {
        const submenu = document.getElementById(submenuId);
        const arrow = element.querySelector('.menu-arrow');

        if (submenu.style.display === 'none') {
            submenu.style.display = 'block';
            arrow.classList.add('up');
            element.classList.add('expanded');
        } else {
            submenu.style.display = 'none';
            arrow.classList.remove('up');
            element.classList.remove('expanded');
        }
    }

    function adjustQuantity(inventoryId, delta) {
        const input = document.querySelector(`input[data-inventory-id="${inventoryId}"].editable-quantity`);
        let currentValue = parseInt(input.value) || 0;
        let newValue = currentValue + delta;
        if (newValue < 0) newValue = 0;
        input.value = newValue;
        input.style.borderColor = '#faad14';
        setTimeout(() => {
            input.style.borderColor = '#d9d9d9';
        }, 500);
    }

    function saveChanges(inventoryId) {
        const productNameInput = document.querySelector(`input[data-inventory-id="${inventoryId}"].editable-product-name`);
        const quantityInput = document.querySelector(`input[data-inventory-id="${inventoryId}"].editable-quantity`);
        const productId = productNameInput.dataset.productId;

        const productName = productNameInput.value.trim();
        const quantity = parseInt(quantityInput.value);

        if (!productName) {
            alert('商品名称不能为空');
            productNameInput.focus();
            return;
        }

        if (isNaN(quantity) || quantity < 0) {
            alert('请输入有效的库存数量');
            quantityInput.focus();
            return;
        }

        const updateData = {
            id: inventoryId,
            productId: productId,
            quantity: quantity
        };

        const productUpdateData = {
            id: productId,
            productName: productName
        };

        Promise.all([
            fetch('/inventory/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updateData)
            }),
            fetch('/product/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productUpdateData)
            })
        ])
        .then(responses => Promise.all(responses.map(r => r.text())))
        .then(results => {
            if (results[0] === 'success' && results[1] === 'success') {
                alert('保存成功！');
                location.reload();
            } else {
                alert('保存失败: ' + (results[0] !== 'success' ? results[0] : results[1]));
            }
        })
        .catch(error => {
            alert('请求失败: ' + error);
        });
    }

    function toggleNewProductForm() {
        const form = document.getElementById('newProductForm');
        const btnText = document.getElementById('toggleBtnText');
        if (form.style.display === 'none') {
            form.style.display = 'block';
            btnText.textContent = '隐藏新商品表单';
            document.getElementById('productId').disabled = true;
        } else {
            form.style.display = 'none';
            btnText.textContent = '显示新商品表单';
            document.getElementById('productId').disabled = false;
        }
    }

    function loadProductList() {
        fetch('/product/list')
            .then(response => response.json())
            .then(products => {
                const select = document.getElementById('productId');
                select.innerHTML = '<option value="">请选择商品</option>';
                products.forEach(product => {
                    const option = document.createElement('option');
                    option.value = product.id;
                    option.textContent = product.productName;
                    select.appendChild(option);
                });
            })
            .catch(error => {
                console.error('加载商品列表失败:', error);
            });
    }

    function showAddInventoryModal() {
        document.getElementById('modalTitle').textContent = '添加库存';
        document.getElementById('inventoryForm').reset();
        document.getElementById('inventoryId').value = '';
        document.getElementById('newProductForm').style.display = 'none';
        document.getElementById('toggleBtnText').textContent = '显示新商品表单';
        document.getElementById('productId').disabled = false;
        loadProductList();
        document.getElementById('inventoryModal').style.display = 'flex';
    }

    function editInventory(id) {
        fetch('/inventory/list')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const rows = doc.querySelectorAll('tbody tr');
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length > 0) {
                        const firstCell = cells[0];
                        if (firstCell.textContent.trim() == id) {
                            document.getElementById('modalTitle').textContent = '编辑库存';
                            document.getElementById('inventoryId').value = id;
                            document.getElementById('newProductForm').style.display = 'none';
                            document.getElementById('toggleBtnText').textContent = '显示新商品表单';
                            document.getElementById('productId').disabled = false;
                            loadProductList().then(() => {
                                setTimeout(() => {
                                    document.getElementById('productId').value = cells[1].dataset.productId || '';
                                }, 100);
                            });
                            document.getElementById('quantity').value = cells[2].textContent.trim();
                            document.getElementById('inventoryModal').style.display = 'flex';
                        }
                    }
                });
            });
    }

    function closeInventoryModal() {
        document.getElementById('inventoryModal').style.display = 'none';
    }

    function submitInventoryForm() {
        const inventoryId = document.getElementById('inventoryId').value;
        const isNewProduct = document.getElementById('newProductForm').style.display !== 'none';

        let url, data;

        if (isNewProduct) {
            const productName = document.getElementById('newProductName').value;
            const productCode = document.getElementById('newProductCode').value;
            const warningQuantity = document.getElementById('newWarningQuantity').value;
            const quantity = document.getElementById('quantity').value;

            if (!productName) {
                alert('请输入商品名称');
                return;
            }

            if (!quantity) {
                alert('请输入库存数量');
                return;
            }

            const autoProductCode = productCode ? productCode : 'P' + Date.now().toString().slice(-6);

            data = {
                product: {
                    productName: productName,
                    productCode: autoProductCode,
                    warningQuantity: warningQuantity || 10
                },
                quantity: quantity
            };

            url = '/inventory/add-with-product';
        } else {
            const productId = document.getElementById('productId').value;

            if (!productId) {
                alert('请选择商品');
                return;
            }

            data = {
                productId: productId,
                quantity: document.getElementById('quantity').value
            };

            if (inventoryId) {
                data.id = inventoryId;
                url = '/inventory/update';
            } else {
                url = '/inventory/add';
            }
        }

        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => response.text())
        .then(result => {
            if (result === 'success') {
                alert(inventoryId ? '更新成功' : '添加成功');
                location.reload();
            } else {
                alert('操作失败: ' + result);
            }
        })
        .catch(error => {
            alert('请求失败: ' + error);
        });
    }

    function deleteInventory(id) {
        if (confirm('确定要删除这条库存记录吗？')) {
            fetch('/inventory/delete/' + id, {
                method: 'POST'
            })
            .then(response => response.text())
            .then(result => {
                if (result === 'success') {
                    alert('删除成功');
                    location.reload();
                } else {
                    alert('删除失败: ' + result);
                }
            })
            .catch(error => {
                alert('请求失败');
            });
        }
    }

    window.addEventListener('DOMContentLoaded', function() {
        calculateInventoryStatus();
        loadProductList();

        // 在这里添加表单提交事件监听
        const inventoryForm = document.getElementById('inventoryForm');
        if (inventoryForm) {
            inventoryForm.addEventListener('submit', function(e) {
                e.preventDefault();
                submitInventoryForm();
            });
        }
    });

    function calculateInventoryStatus() {
        const quantityInputs = document.querySelectorAll('.editable-quantity');
        let sufficientCount = 0;
        let insufficientCount = 0;

        quantityInputs.forEach(input => {
            const quantity = parseInt(input.value) || 0;
            if (quantity > 50) {
                sufficientCount++;
            } else if (quantity <= 10) {
                insufficientCount++;
            }
        });

        document.getElementById('sufficientCount').textContent = sufficientCount;
        document.getElementById('insufficientCount').textContent = insufficientCount;
    }
</script>
