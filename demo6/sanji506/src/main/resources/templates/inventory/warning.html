<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存预警 - NeuMall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #e8e8e8;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-main {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .logo-main .n {
            color: #f59e0b;
        }

        .logo-main .text {
            color: #1e3a5f;
        }

        .logo-subtitle {
            font-size: 14px;
            color: #666;
            letter-spacing: 1px;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .user-info:hover {
            background-color: #f6f9ff;
        }

        .user-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .user-name {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }

        .user-arrow {
            color: #999;
            font-size: 20px;
        }

        .logout-btn {
            margin: 0 20px 20px;
            padding: 8px 16px;
            background: white;
            border: 1px solid #ff4d4f;
            color: #ff4d4f;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            text-align: center;
        }

        .logout-btn:hover {
            background: #ff4d4f;
            color: white;
        }

        .menu {
            flex: 1;
            padding: 8px 0;
        }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            color: #333;
        }

        .menu-item:hover {
            background-color: #f6f9ff;
            color: #1677ff;
        }

        .menu-item.active {
            background-color: #e6f4ff;
            color: #1677ff;
            border-left: 3px solid #1677ff;
        }

        .menu-item.expanded {
            background-color: #f6f9ff;
        }

        .menu-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-arrow {
            transition: transform 0.3s;
            font-size: 12px;
        }

        .menu-arrow.up {
            transform: rotate(180deg);
        }

        .submenu {
            padding-left: 20px;
            background-color: #fafafa;
        }

        .submenu-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #666;
        }

        .submenu-item:hover {
            color: #1677ff;
            background-color: #f6f9ff;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
        }

        .content-header {
            margin-bottom: 30px;
        }

        .content-title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
        }

        .alert-banner {
            background: linear-gradient(135deg, #fff2e8 0%, #fff1f0 100%);
            border: 1px solid #ffccc7;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .alert-icon {
            font-size: 32px;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-size: 16px;
            font-weight: 600;
            color: #cf1322;
            margin-bottom: 4px;
        }

        .alert-text {
            font-size: 14px;
            color: #666;
        }

        .alert-count {
            font-size: 36px;
            font-weight: bold;
            color: #f5222d;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #f5222d;
        }

        .table-container {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background-color: #fff2e8;
        }

        .table th {
            padding: 16px 20px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #cf1322;
            border-bottom: 1px solid #ffccc7;
        }

        .table td {
            padding: 16px 20px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

        .table tbody tr:hover {
            background-color: #fafafa;
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .quantity-cell {
            font-weight: bold;
            color: #f5222d;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-low {
            background-color: #fff2e8;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }

        .status-critical {
            background-color: #fff1f0;
            color: #f5222d;
            border: 1px solid #ffa39e;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 16px;
            color: #999;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 280px;
            right: 0;
            padding: 16px 40px;
            text-align: center;
            color: #999;
            font-size: 13px;
            background-color: #f5f5f5;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }

            .main-content {
                margin-left: 240px;
                padding: 20px;
            }

            .footer {
                left: 240px;
            }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-main">
                    <span class="n">N</span><span class="text">euMall</span>
                </div>
                <div class="logo-subtitle">大连东软信息学院</div>
            </div>
        </div>

        <div class="user-info">
            <div class="user-left">
                <div class="avatar">林</div>
                <div class="user-name">林星辉</div>
            </div>
            <div class="user-arrow">→</div>
        </div>

        <div class="logout-btn" onclick="window.location.href='/logout'">退出登录</div>

        <div class="menu">
            <div class="menu-item expanded" onclick="toggleMenu(this, 'platform-submenu')">
                <div class="menu-item-header">
                    <span>平台管理</span>
                    <span class="menu-arrow up"></span>
                </div>
            </div>
            <div class="submenu" id="platform-submenu">
                <div class="submenu-item" onclick="window.location.href='/users'">用户管理</div>
                <div class="submenu-item" onclick="window.location.href='/shops'">店铺管理</div>
            </div>

            <div class="menu-item" onclick="toggleMenu(this, 'shop-submenu')">
                <div class="menu-item-header">
                    <span>我的店铺管理</span>
                    <span class="menu-arrow">∨</span>
                </div>
            </div>
            <div class="submenu" id="shop-submenu" style="display: none;">
                <div class="submenu-item">店铺信息</div>
                <div class="submenu-item">商品管理</div>
                <div class="submenu-item">订单管理</div>
            </div>

            <div class="menu-item" onclick="window.location.href='/inventory/list'">库存管理</div>
            <div class="menu-item active" onclick="window.location.href='/inventory/warning'">库存预警</div>
            <div class="menu-item" onclick="window.location.href='/inventory/chart'">库存可视化</div>
        </div>

        <div style="padding: 20px; color: #999; font-size: 13px; text-align: center;">
            Copyright © 2026 大连东软信息学院
        </div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <h1 class="content-title">库存预警</h1>
        </div>

        <div class="alert-banner" th:if="${!#lists.isEmpty(warningList)}">
            <div class="alert-icon">⚠️</div>
            <div class="alert-content">
                <div class="alert-title">库存预警提醒</div>
                <div class="alert-text">以下商品库存不足，请及时补货</div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="alert-count" th:text="${#lists.size(warningList)}">0</div>
                <button onclick="location.reload()" style="padding: 8px 16px; border: 1px solid #1677ff; background: white; color: #1677ff; border-radius: 4px; cursor: pointer;">刷新</button>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(warningList)}">
            <div class="empty-icon">✅</div>
            <div class="empty-text">当前没有低库存商品，所有商品库存充足！</div>
        </div>

        <div class="stats-cards" th:if="${!#lists.isEmpty(warningList)}">
            <div class="stat-card">
                <div class="stat-label">预警商品数</div>
                <div class="stat-value" th:text="${#lists.size(warningList)}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">严重不足</div>
                <div class="stat-value" style="color: #f5222d;">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">库存偏低</div>
                <div class="stat-value" style="color: #fa8c16;">-</div>
            </div>
        </div>

        <div class="table-container" th:if="${!#lists.isEmpty(warningList)}">
            <div class="table-header">
                <div class="table-title">⚠️ 低库存商品列表</div>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>序号</th>
                    <th>商品名称</th>
                    <th>当前库存</th>
                    <th>预警阈值</th>
                    <th>预警级别</th>
                    <th>建议操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item, iterStat : ${warningList}">
                    <td th:text="${iterStat.count}">1</td>
                    <td th:text="${item.productName != null ? item.productName : '未知商品'}">-</td>
                    <td class="quantity-cell" th:text="${item.quantity}">0</td>
                    <td th:text="${item.warningQuantity != null ? item.warningQuantity : '-'}">-</td>
                    <td>
                        <span class="status-badge status-low" th:if="${item.quantity > 10}">偏低</span>
                        <span class="status-badge status-critical" th:if="${item.quantity <= 10}">严重不足</span>
                    </td>
                    <td>
                        <span th:if="${item.quantity > 10}">建议补货</span>
                        <span th:if="${item.quantity <= 10}" style="color: #f5222d; font-weight: bold;">立即补货</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        Copyright © 2026 大连东软信息学院
    </div>
</div>

<script>
    function toggleMenu(element, submenuId) {
        const submenu = document.getElementById(submenuId);
        const arrow = element.querySelector('.menu-arrow');

        if (submenu.style.display === 'none') {
            submenu.style.display = 'block';
            arrow.classList.add('up');
            element.classList.add('expanded');
        } else {
            submenu.style.display = 'none';
            arrow.classList.remove('up');
            element.classList.remove('expanded');
        }
    }
</script>
</body>
</html>
